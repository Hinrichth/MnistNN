data:
  dataset_dir: "../mnist"
  train_images: "train-images.idx3-ubyte"
  train_labels: "train-labels.idx1-ubyte"
  test_images: "t10k-images.idx3-ubyte"
  test_labels: "t10k-labels.idx1-ubyte"

  #dataset_dir: "../mnist_extended"
  #train_images: "emnist-digits-train-images-idx3-ubyte"
  #train_labels: "emnist-digits-train-labels-idx1-ubyte"
  #test_images:  "emnist-digits-test-images-idx3-ubyte"
  #test_labels:  "emnist-digits-test-labels-idx1-ubyte"

  image_size:
    height: 28
    width: 28

  val_ratio: 0.2

  batch_size: 64
  shuffle: true

model:
  layers:
    - type: Dense
      in: 784
      out: 30

    - type: Activation
      kind: ReLU  # (ReLU or Sigmoid)

    - type: Dense
      in: 30
      out: 10

train:
  epochs: 5

  # sgd optimizer
  optimizer:
    learning_rate: 0.01
    momentum: 0
    dampening: 0
    weight_decay: 0
    nesterov: false

  # ReduceLROnPlateau
  scheduler:
    patience: 10
    reduction_factor: 0.1
    minimal_lr: 0
    minimal_lr_change: 1e-08
  
  early_stopping:
    patience: 20